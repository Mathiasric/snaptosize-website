[build]
  base = "app-next"
  publish = "out"
  command = "npm run build"

[[redirects]]
  from = "/etsy-image-resizer"
  to = "https://snaptosize.com"
  status = 301

[[redirects]]
  from = "/etsy-print-size-guide"
  to = "/sizes"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/app*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
